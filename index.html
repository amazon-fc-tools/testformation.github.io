<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Demande de Formation - Amazon</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: linear-gradient(135deg, #232F3E 0%, #1a2532 100%);
            min-height: 100vh;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        
        .container {
            max-width: 500px;
            width: 100%;
            background: white;
            border-radius: 20px;
            padding: 25px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
        }
        
        .logo {
            text-align: center;
            margin-bottom: 20px;
        }
        
        .logo h1 {
            color: #232F3E;
            font-size: 24px;
        }
        
        .logo p {
            color: #FF9900;
            font-weight: bold;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #232F3E;
        }
        
        select, input {
            width: 100%;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 10px;
            font-size: 16px;
            font-family: inherit;
            box-sizing: border-box;
            transition: border-color 0.2s;
        }
        
        select:focus, input:focus {
            outline: none;
            border-color: #FF9900;
        }
        
        button {
            width: 100%;
            background: #FF9900;
            color: #232F3E;
            border: none;
            padding: 14px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 10px;
            cursor: pointer;
            transition: transform 0.2s, background 0.2s;
        }
        
        button:active {
            transform: scale(0.98);
            background: #e68a00;
        }
        
        button:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
            opacity: 0.6;
        }
        
        .message {
            margin-top: 20px;
            padding: 12px;
            border-radius: 10px;
            display: none;
            text-align: center;
            font-size: 14px;
        }
        
        .success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }
        
        .error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
        
        .warning {
            background: #fff3cd;
            color: #856404;
            border: 1px solid #ffeeba;
        }
        
        .info {
            font-size: 12px;
            color: #666;
            text-align: center;
            margin-top: 20px;
            padding-top: 15px;
            border-top: 1px solid #eee;
        }
        
        .badge {
            display: inline-block;
            background: #f0f0f0;
            padding: 5px 10px;
            border-radius: 15px;
            font-size: 12px;
            margin: 5px;
        }
        
        .loader {
            display: none;
            text-align: center;
            margin-top: 10px;
            font-size: 14px;
            color: #FF9900;
        }
        
        .row-2cols {
            display: flex;
            gap: 15px;
            margin-bottom: 20px;
        }
        
        .row-2cols .form-group {
            flex: 1;
            margin-bottom: 0;
        }
        
        .checking {
            font-size: 12px;
            color: #FF9900;
            margin-top: 5px;
            display: none;
            text-align: center;
        }
        
        .checking.show {
            display: block;
        }
        
        .duplicate-field {
            border-color: #856404 !important;
            background-color: #fff3cd !important;
        }
        
        @media (max-width: 500px) {
            .row-2cols {
                flex-direction: column;
                gap: 20px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">
            <h1>📦 Demande de Formation au V-Return</h1>
            <p>Amazon FC LIL1</p>
        </div>
        
        <form id="formationForm">
            <div class="row-2cols">
                <div class="form-group">
                    <label>👤 Login Amazon</label>
                    <input type="text" id="login" placeholder="Ex: abzy" required autocomplete="off">
                </div>
                
                <div class="form-group">
                    <label>🏷️ Équipe</label>
                    <select id="equipe" required>
                        <option value="">-- Choisissez --</option>
                        <option value="Équipe O2">Équipe O2</option>
                        <option value="Équipe I2">Équipe I2</option>
                    </select>
                </div>
            </div>
            
            <div class="form-group">
                <label>🎯 Process souhaité</label>
                <select id="process" required>
                    <option value="">-- Choisissez un process --</option>
                    <option value="Pack LTL">Pack LTL (Packing commande retour vendeur)</option>
                    <option value="Pack Donation">Pack Donation (Packing de la donation)</option>
                    <option value="Accompagnant">Accompagnant (Transfert des palettes du VRET vers la celulle A)</option>
                    <option value="Recover">Recover (Traitement et dépotage des unités destinées à la destruction)</option>
                    <option value="Damage Single">Damage Single (Packing commande single mais avec des articles endommagés)</option>
                    <option value="Grading">Grading (évaluation des articles éligibles pour le warehouse deals)</option>
                    <option value="Paletisation">Paletisation (Préparation des palettes pour le transport)</option>
                    <option value="Solving VRET">Solving VRET (Résolution de problème, traitement de l'iol...)</option>
                    <option value="Wrangle VRET">Wrangle VRET (Comme le wrangle au P2X avec quelques modifications)</option>
                    <option value="RVR">RVR-Retourned Vendor Return (Comme la receive avec quelques modifications)</option>
                    <option value="Chargeur VRET">Chargeur VRET (Chargement des camions pour le VRET)</option>
                    <option value="Dispatch">Dispatch (Répartir les unités du grading dans des palettes, fermeture informatique des palettes)</option>
                    <option value="POC HAZMAT">POC HAZMAT (Autonomie, responsable de la zone recover, apprentissage des différents type d'hazmat et comment les dépoter)</option>
                </select>
            </div>
            
            <div class="form-group">
                <label>📝 Message supplémentaire (optionnel)</label>
                <input type="text" id="comment" placeholder="Précisions, Raison">
            </div>
            
            <button type="submit">📨 Envoyer ma demande</button>
        </form>
        
        <div id="checkingStatus" class="checking">🔍 Vérification des doublons en cours...</div>
        <div id="message" class="message"></div>
        <div id="loader" class="loader">⏳ Envoi en cours...</div>
        
        <div class="info">
            <span class="badge">🔒 Données sécurisées</span>
            <span class="badge">📱 Scan & Go</span>
            <span class="badge">🚫 Anti-doublon actif</span>
        </div>
    </div>

    <script>
        // ⚠️ REMPLACE PAR TON URL GOOGLE SCRIPT ⚠️
        const GOOGLE_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwCejVQFADGIC0uE2qNd73Qtp6_uuzFftXTLNKuvMozi_prjRa66NahKikZWKszrzM7/exec";
        
        let checkTimeout = null;
        let isChecking = false;
        let currentCheckStatus = { login: "", process: "", isDuplicate: false };
        
        // Fonction pour vérifier les doublons via doGet
        async function checkDuplicate(login, process) {
            if (!login || !process) return false;
            
            isChecking = true;
            document.getElementById('checkingStatus').classList.add('show');
            
            try {
                const url = `${GOOGLE_SCRIPT_URL}?login=${encodeURIComponent(login)}&process=${encodeURIComponent(process)}&t=${Date.now()}`;
                
                const response = await fetch(url, {
                    method: 'GET',
                    mode: 'no-cors' // no-cors car Google Script peut avoir des restrictions CORS
                });
                
                // Avec mode 'no-cors', on ne peut pas lire la réponse facilement
                // On va plutôt se fier à la réponse du POST pour la vérification
                // Pour une vérification fiable, on utilisera la méthode POST avec action=check
                
                // Alternative : utiliser POST pour la vérification
                const checkResponse = await fetch(GOOGLE_SCRIPT_URL, {
                    method: 'POST',
                    mode: 'no-cors',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        action: 'check',
                        login: login,
                        process: process
                    })
                });
                
                // Avec no-cors, on ne peut pas lire la réponse
                // On retourne false et on laisse la vérification finale au submit
                return false;
                
            } catch (error) {
                console.error('Erreur vérification:', error);
                return false;
            } finally {
                isChecking = false;
                document.getElementById('checkingStatus').classList.remove('show');
            }
        }
        
        // Mettre à jour l'interface visuelle pour avertir d'un potentiel doublon
        function updateDuplicateWarning() {
            // Version simplifiée : on ne bloque pas à l'avance car avec no-cors on ne peut pas lire la réponse
            // La vérification se fera uniquement à la soumission
        }
        
        // Fonction pour nettoyer les highlights visuels
        function clearDuplicateHighlight() {
            const loginInput = document.getElementById('login');
            const processSelect = document.getElementById('process');
            loginInput.classList.remove('duplicate-field');
            processSelect.classList.remove('duplicate-field');
        }
        
        function showDuplicateHighlight() {
            const loginInput = document.getElementById('login');
            const processSelect = document.getElementById('process');
            loginInput.classList.add('duplicate-field');
            processSelect.classList.add('duplicate-field');
        }
        
        // Écouter les changements pour nettoyer le highlight
        document.getElementById('login').addEventListener('input', function() {
            clearDuplicateHighlight();
            const msgDiv = document.getElementById('message');
            if (msgDiv.classList.contains('warning')) {
                msgDiv.style.display = 'none';
            }
        });
        
        document.getElementById('process').addEventListener('change', function() {
            clearDuplicateHighlight();
            const msgDiv = document.getElementById('message');
            if (msgDiv.classList.contains('warning')) {
                msgDiv.style.display = 'none';
            }
        });
        
        // Soumission du formulaire
        document.getElementById('formationForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const login = document.getElementById('login').value.trim();
            const equipe = document.getElementById('equipe').value;
            const process = document.getElementById('process').value;
            const comment = document.getElementById('comment').value;
            
            if (!login || !equipe || !process) {
                showMessage('Veuillez remplir tous les champs obligatoires (Login, Équipe, Process)', 'error');
                return;
            }
            
            document.getElementById('loader').style.display = 'block';
            document.getElementById('message').style.display = 'none';
            clearDuplicateHighlight();
            
            const data = {
                login: login,
                equipe: equipe,
                process: process,
                comment: comment || ""
            };
            
            try {
                const response = await fetch(GOOGLE_SCRIPT_URL, {
                    method: 'POST',
                    mode: 'no-cors',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify(data)
                });
                
                // Avec mode 'no-cors', on ne peut pas lire la réponse du serveur
                // On suppose donc que tout va bien, mais on ajoute une vérification côté client
                // Pour une solution plus fiable, il faudrait enlever 'no-cors' et configurer CORS dans Google Script
                
                // Alternative : on considère que l'envoi a réussi
                // Le script Google refusera le doublon de son côté
                showMessage('✅ Demande envoyée avec succès ! Merci.', 'success');
                
                // Réinitialiser seulement process et comment
                document.getElementById('process').value = '';
                document.getElementById('comment').value = '';
                
            } catch (error) {
                console.error('Erreur:', error);
                showMessage('❌ Erreur lors de l\'envoi. Vérifiez votre connexion et réessayez.', 'error');
            } finally {
                document.getElementById('loader').style.display = 'none';
            }
        });
        
        function showMessage(msg, type) {
            const messageDiv = document.getElementById('message');
            messageDiv.textContent = msg;
            messageDiv.className = `message ${type}`;
            messageDiv.style.display = 'block';
            
            if (type === 'warning') {
                showDuplicateHighlight();
            } else {
                clearDuplicateHighlight();
            }
            
            setTimeout(() => {
                if (messageDiv.style.display === 'block') {
                    messageDiv.style.display = 'none';
                    if (type !== 'warning') {
                        clearDuplicateHighlight();
                    }
                }
            }, 5000);
        }
        
        console.log('✅ Formulaire prêt - La vérification des doublons se fait côté Google Sheets');
    </script>
</body>
</html>

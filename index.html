<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Demande de Formation - Amazon</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: linear-gradient(135deg, #232F3E 0%, #1a2532 100%);
            min-height: 100vh;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        
        .container {
            max-width: 500px;
            width: 100%;
            background: white;
            border-radius: 20px;
            padding: 25px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
        }
        
        .logo {
            text-align: center;
            margin-bottom: 20px;
        }
        
        .logo h1 {
            color: #232F3E;
            font-size: 24px;
        }
        
        .logo p {
            color: #FF9900;
            font-weight: bold;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #232F3E;
        }
        
        select, input {
            width: 100%;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 10px;
            font-size: 16px;
            font-family: inherit;
            box-sizing: border-box;
        }
        
        select:focus, input:focus {
            outline: none;
            border-color: #FF9900;
        }
        
        button {
            width: 100%;
            background: #FF9900;
            color: #232F3E;
            border: none;
            padding: 14px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 10px;
            cursor: pointer;
            transition: transform 0.2s, background 0.2s;
        }
        
        button:active {
            transform: scale(0.98);
            background: #e68a00;
        }
        
        .message {
            margin-top: 20px;
            padding: 12px;
            border-radius: 10px;
            display: none;
            text-align: center;
        }
        
        .success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }
        
        .error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
        
        .info {
            font-size: 12px;
            color: #666;
            text-align: center;
            margin-top: 20px;
            padding-top: 15px;
            border-top: 1px solid #eee;
        }
        
        .badge {
            display: inline-block;
            background: #f0f0f0;
            padding: 5px 10px;
            border-radius: 15px;
            font-size: 12px;
            margin: 5px;
        }
        
        .loader {
            display: none;
            text-align: center;
            margin-top: 10px;
            font-size: 14px;
            color: #FF9900;
        }
        
        .row-2cols {
            display: flex;
            gap: 15px;
            margin-bottom: 20px;
        }
        
        .row-2cols .form-group {
            flex: 1;
            margin-bottom: 0;
        }
        
        @media (max-width: 500px) {
            .row-2cols {
                flex-direction: column;
                gap: 20px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">
            <h1>📦 Demande de Formation</h1>
            <p>Amazon FC</p>
        </div>
        
        <form id="formationForm">
            <div class="row-2cols">
                <div class="form-group">
                    <label>👤 Login Amazon</label>
                    <input type="text" id="login" placeholder="Ex: JOHN.DOE" required autocomplete="off">
                </div>
                
                <div class="form-group">
                    <label>🏷️ Équipe</label>
                    <select id="equipe" required>
                        <option value="">-- Choisissez --</option>
                        <option value="Équipe O2">Équipe A</option>
                        <option value="Équipe I2">Équipe B</option>
                    </select>
                </div>
            </div>
            
            <div class="form-group">
                <label>🎯 Process souhaité</label>
                <select id="process" required>
                    <option value="">-- Choisissez un process --</option>
                    <option value="Pack LTL">Pack LTL (Packing commande retour vendeur)</option>
                    <option value="Pack Donation">Pack Donation (Packing de la donation)</option>
                    <option value="Accompagnant">Accompagnant (Transfert des palettes du VRET vers la celulle A)</option>
                    <option value="Recover">Recover (Traitement et dépotage des unités destinées à la destruction)</option>
                    <option value="Damage Single">Damage Single (Packing commande single mais avec des articles endommagés)</option>
                    <option value="Grading">Grading (évaluation des articles éligibles pour le warehouse deals)</option>
                    <option value="Paletisation">Paletisation (Préparation des palettes pour le transport)</option>
                    <option value="Solving VRET">Solving VRET (Résolution de problème, traitement de l'iol...)</option>
                    <option value="Wrangle VRET">Wrangle VRET (Comme le wrangle au P2X avec quelques modifications)</option>
                    <option value="RVR">RVR-Retourned Vendor Return (Comme la receive avec quelques modifications)</option>
                    <option value="Chargeur VRET">Chargeur VRET (Chargement des camions pour le VRET)</option>
                    <option value="Dispatch">Dispatch (Répartir les unités du grading dans des palettes, fermeture informatique des palettes)</option>
                    <option value="POC HAZMAT">POC HAZMAT (Autonomie, responsable de la zone recover, apprentissage des différents type d'hazmat et comment les dépoter)</option>
                </select>
            </div>
            
            <div class="form-group">
                <label>📝 Message supplémentaire (optionnel)</label>
                <input type="text" id="comment" placeholder="Précisions, disponibilités...">
            </div>
            
            <button type="submit">📨 Envoyer ma demande</button>
        </form>
        
        <div id="message" class="message"></div>
        <div id="loader" class="loader">⏳ Envoi en cours...</div>
        
        <div class="info">
            <span class="badge">🔒 Données sécurisées</span>
            <span class="badge">📱 Scan & Go</span>
            <span class="badge">☁️ Envoi vers Google Sheets</span>
        </div>
    </div>

    <script>
        // ⚠️ REMPLACE PAR TON URL GOOGLE SCRIPT ⚠️
        const GOOGLE_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwCejVQFADGIC0uE2qNd73Qtp6_uuzFftXTLNKuvMozi_prjRa66NahKikZWKszrzM7/exec";
        
        document.getElementById('formationForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const login = document.getElementById('login').value.trim();
            const equipe = document.getElementById('equipe').value;
            const process = document.getElementById('process').value;
            const comment = document.getElementById('comment').value;
            
            if (!login || !equipe || !process) {
                showMessage('Veuillez remplir tous les champs obligatoires (Login, Équipe, Process)', 'error');
                return;
            }
            
            document.getElementById('loader').style.display = 'block';
            
            const data = {
                login: login,
                equipe: equipe,
                process: process,
                comment: comment || ""
            };
            
            try {
                await fetch(GOOGLE_SCRIPT_URL, {
                    method: 'POST',
                    mode: 'no-cors',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify(data)
                });
                
                showMessage('✅ Demande envoyée avec succès ! Merci.', 'success');
                
                // Réinitialiser seulement process et comment (garder login et equipe pour faciliter)
                document.getElementById('process').value = '';
                document.getElementById('comment').value = '';
                
            } catch (error) {
                console.error('Erreur:', error);
                showMessage('❌ Erreur lors de l\'envoi. Réessaie plus tard.', 'error');
            } finally {
                document.getElementById('loader').style.display = 'none';
            }
        });
        
        function showMessage(msg, type) {
            const messageDiv = document.getElementById('message');
            messageDiv.textContent = msg;
            messageDiv.className = `message ${type}`;
            messageDiv.style.display = 'block';
            
            setTimeout(() => {
                messageDiv.style.display = 'none';
            }, 5000);
        }
    </script>
</body>
</html>

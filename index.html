<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Demande de Formation - Amazon</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: linear-gradient(135deg, #232F3E 0%, #1a2532 100%);
            min-height: 100vh;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        
        .container {
            max-width: 500px;
            width: 100%;
            background: white;
            border-radius: 20px;
            padding: 25px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
        }
        
        .logo {
            text-align: center;
            margin-bottom: 20px;
        }
        
        .logo h1 {
            color: #232F3E;
            font-size: 24px;
        }
        
        .logo p {
            color: #FF9900;
            font-weight: bold;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #232F3E;
        }
        
        select, input {
            width: 100%;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 10px;
            font-size: 16px;
            font-family: inherit;
            box-sizing: border-box;
        }
        
        select:focus, input:focus {
            outline: none;
            border-color: #FF9900;
        }
        
        button {
            width: 100%;
            background: #FF9900;
            color: #232F3E;
            border: none;
            padding: 14px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 10px;
            cursor: pointer;
            transition: transform 0.2s, background 0.2s;
        }
        
        button:active {
            transform: scale(0.98);
            background: #e68a00;
        }
        
        .message {
            margin-top: 20px;
            padding: 12px;
            border-radius: 10px;
            display: none;
            text-align: center;
        }
        
        .success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }
        
        .error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
        
        .warning {
            background: #fff3cd;
            color: #856404;
            border: 1px solid #ffeeba;
        }
        
        .info {
            font-size: 12px;
            color: #666;
            text-align: center;
            margin-top: 20px;
            padding-top: 15px;
            border-top: 1px solid #eee;
        }
        
        .badge {
            display: inline-block;
            background: #f0f0f0;
            padding: 5px 10px;
            border-radius: 15px;
            font-size: 12px;
            margin: 5px;
        }
        
        .loader {
            display: none;
            text-align: center;
            margin-top: 10px;
            font-size: 14px;
            color: #FF9900;
        }
        
        .row-2cols {
            display: flex;
            gap: 15px;
            margin-bottom: 20px;
        }
        
        .row-2cols .form-group {
            flex: 1;
            margin-bottom: 0;
        }
        
        @media (max-width: 500px) {
            .row-2cols {
                flex-direction: column;
                gap: 20px;
            }
        }
        
        .reset-link {
            text-align: center;
            margin-top: 15px;
            font-size: 11px;
        }
        
        .reset-link a {
            color: #999;
            text-decoration: none;
        }
        
        .reset-link a:active {
            color: #FF9900;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">
            <h1>📦 Demande de Formation</h1>
            <p>Amazon FC</p>
        </div>
        
        <form id="formationForm">
            <div class="row-2cols">
                <div class="form-group">
                    <label>👤 Login Amazon</label>
                    <input type="text" id="login" placeholder="Ex: JOHN.DOE" required autocomplete="off">
                </div>
                
                <div class="form-group">
                    <label>🏷️ Équipe</label>
                    <select id="equipe" required>
                        <option value="">-- Choisissez --</option>
                        <option value="Équipe O2">Équipe O2</option>
                        <option value="Équipe I2">Équipe I2</option>
                    </select>
                </div>
            </div>
            
            <div class="form-group">
                <label>🎯 Process souhaité</label>
                <select id="process" required>
                    <option value="Pack LTL">Pack LTL (Packing commande retour vendeur)</option>
                    <option value="Pack Donation">Pack Donation (Packing de la donation)</option>
                    <option value="Accompagnant">Accompagnant (Transfert des palettes du VRET vers la celulle A)</option>
                    <option value="Recover">Recover (Traitement et dépotage des unités destinées à la destruction)</option>
                    <option value="Damage Single">Damage Single (Packing commande single mais avec des articles endommagés)</option>
                    <option value="Grading">Grading (évaluation des articles éligibles pour le warehouse deals)</option>
                    <option value="Paletisation">Paletisation (Préparation des palettes pour le transport)</option>
                    <option value="Solving VRET">Solving VRET (Résolution de problème, traitement de l'iol...)</option>
                    <option value="Wrangle VRET">Wrangle VRET (Comme le wrangle au P2X avec quelques modifications)</option>
                    <option value="RVR">RVR-Retourned Vendor Return (Comme la receive avec quelques modifications)</option>
                    <option value="Chargeur VRET">Chargeur VRET (Chargement des camions pour le VRET)</option>
                    <option value="Dispatch">Dispatch (Répartir les unités du grading dans des palettes, fermeture informatique des palettes)</option>
                    <option value="POC HAZMAT">POC HAZMAT (Autonomie, responsable de la zone recover, apprentissage des différents type d'hazmat et comment les dépoter)</option>
                </select>
            </div>
            
            <div class="form-group">
                <label>📝 Message supplémentaire (optionnel)</label>
                <input type="text" id="comment" placeholder="Précisions, disponibilités...">
            </div>
            
            <button type="submit">📨 Envoyer ma demande</button>
        </form>
        
        <div id="message" class="message"></div>
        <div id="loader" class="loader">⏳ Envoi en cours...</div>
        
        <div class="reset-link">
            <a href="#" id="resetLink">🔧 Problème ? Réinitialiser mes demandes</a>
        </div>
        
        <div class="info">
            <span class="badge">🔒 Données sécurisées</span>
            <span class="badge">📱 Scan & Go</span>
            <span class="badge">☁️ Envoi vers Google Sheets</span>
            <span class="badge">🛡️ Anti-doublon actif</span>
        </div>
    </div>

    <script>
        // ⚠️ REMPLACE PAR TON URL GOOGLE SCRIPT ⚠️
        const GOOGLE_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwCejVQFADGIC0uE2qNd73Qtp6_uuzFftXTLNKuvMozi_prjRa66NahKikZWKszrzM7/exec";
        
        // Clé pour stocker les demandes dans localStorage (anti-doublon)
        const STORAGE_KEY = "amazonTrainingRequests";
        
        // ========== FONCTIONS ANTI-DOUBLON ==========
        
        // Récupérer les demandes d'un utilisateur
        function getUserRequests(login) {
            let allRequests = localStorage.getItem(STORAGE_KEY);
            allRequests = allRequests ? JSON.parse(allRequests) : [];
            return allRequests.filter(r => r.login === login);
        }
        
        // Vérifier si l'utilisateur a déjà demandé ce process
        function hasAlreadyRequested(login, process) {
            const userRequests = getUserRequests(login);
            return userRequests.some(r => r.process === process);
        }
        
        // Sauvegarder une nouvelle demande
        function saveRequest(login, equipe, process, comment) {
            let allRequests = localStorage.getItem(STORAGE_KEY);
            allRequests = allRequests ? JSON.parse(allRequests) : [];
            
            allRequests.push({
                login: login,
                equipe: equipe,
                process: process,
                comment: comment,
                timestamp: new Date().toISOString()
            });
            
            localStorage.setItem(STORAGE_KEY, JSON.stringify(allRequests));
        }
        
        // Réinitialiser les demandes d'un utilisateur
        function resetUserRequests(login) {
            let allRequests = localStorage.getItem(STORAGE_KEY);
            allRequests = allRequests ? JSON.parse(allRequests) : [];
            
            const filteredRequests = allRequests.filter(r => r.login !== login);
            localStorage.setItem(STORAGE_KEY, JSON.stringify(filteredRequests));
            
            // Retourner le nombre de demandes supprimées
            return allRequests.length - filteredRequests.length;
        }
        
        // Afficher le compteur de demandes (optionnel)
        function updateRequestCount(login) {
            const userRequests = getUserRequests(login);
            const count = userRequests.length;
            
            // Tu peux afficher ce compteur quelque part si tu veux
            console.log(`${login} a fait ${count} demande(s)`);
        }
        
        // ========== FORMULAIRE ==========
        
        document.getElementById('formationForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const login = document.getElementById('login').value.trim().toUpperCase();
            const equipe = document.getElementById('equipe').value;
            const process = document.getElementById('process').value;
            const comment = document.getElementById('comment').value;
            
            // Vérification des champs obligatoires
            if (!login || !equipe || !process) {
                showMessage('Veuillez remplir tous les champs obligatoires', 'error');
                return;
            }
            
            // 🔴 VÉRIFICATION ANTI-DOUBLON 🔴
            if (hasAlreadyRequested(login, process)) {
                showMessage(`⚠️ ${login}, tu as déjà fait une demande pour le process "${process}". Tu ne peux pas faire deux fois la même demande.`, 'warning');
                return;
            }
            
            // Afficher le loader
            document.getElementById('loader').style.display = 'block';
            
            // Préparer les données
            const data = {
                login: login,
                equipe: equipe,
                process: process,
                comment: comment || ""
            };
            
            try {
                // Envoyer vers Google Sheets
                await fetch(GOOGLE_SCRIPT_URL, {
                    method: 'POST',
                    mode: 'no-cors',
                    headers: {
                        'Content-Type':application/json',
                    },
                    body: JSON.stringify(data)
                });
                
                // Sauvegarder localement pour l'anti-doublon
                saveRequest(login, equipe, process, comment);
                
                showMessage(`✅ Demande envoyée avec succès ${login} ! Merci.`, 'success');
                
                // Réinitialiser seulement process et comment
                document.getElementById('process').value = '';
                document.getElementById('comment').value = '';
                
                // Mettre à jour l'affichage du compteur
                updateRequestCount(login);
                
            } catch (error) {
                console.error('Erreur:', error);
                showMessage('❌ Erreur lors de l\'envoi. Vérifie ta connexion Internet.', 'error');
            } finally {
                document.getElementById('loader').style.display = 'none';
            }
        });
        
        // ========== RÉINITIALISATION ==========
        
        document.getElementById('resetLink').addEventListener('click', function(e) {
            e.preventDefault();
            
            const login = document.getElementById('login').value.trim().toUpperCase();
            
            if (!login) {
                showMessage('Entre ton login dans le champ ci-dessus avant de réinitialiser', 'error');
                return;
            }
            
            const deletedCount = resetUserRequests(login);
            
            if (deletedCount > 0) {
                showMessage(`🔧 ${login}, ${deletedCount} demande(s) supprimée(s). Tu peux maintenant refaire de nouvelles demandes.`, 'success');
            } else {
                showMessage(`ℹ️ ${login}, tu n'avais aucune demande enregistrée.`, 'info');
            }
        });
        
        // ========== MESSAGE ==========
        
        function showMessage(msg, type) {
            const messageDiv = document.getElementById('message');
            messageDiv.textContent = msg;
            messageDiv.className = `message ${type}`;
            messageDiv.style.display = 'block';
            
            // Ajouter un style spécial pour le warning
            if (type === 'warning') {
                messageDiv.style.borderLeft = '4px solid #856404';
            }
            
            setTimeout(() => {
                messageDiv.style.display = 'none';
            }, 6000);
        }
        
        // Auto-nettoyage : supprimer les demandes de plus de 30 jours (optionnel)
        function cleanOldRequests() {
            let allRequests = localStorage.getItem(STORAGE_KEY);
            allRequests = allRequests ? JSON.parse(allRequests) : [];
            
            const thirtyDaysAgo = new Date();
            thirtyDaysAgo.setDate(thirtyDaysAgo.getDate() - 30);
            
            const cleanedRequests = allRequests.filter(r => {
                return new Date(r.timestamp) > thirtyDaysAgo;
            });
            
            if (cleanedRequests.length !== allRequests.length) {
                localStorage.setItem(STORAGE_KEY, JSON.stringify(cleanedRequests));
                console.log(`Nettoyage auto : ${allRequests.length - cleanedRequests.length} anciennes demandes supprimées`);
            }
        }
        
        // Exécuter le nettoyage au chargement de la page
        cleanOldRequests();
    </script>
</body>
</html>

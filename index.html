<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Demande de Formation - Amazon</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: linear-gradient(135deg, #232F3E 0%, #1a2532 100%);
            min-height: 100vh;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        
        .container {
            max-width: 500px;
            width: 100%;
            background: white;
            border-radius: 20px;
            padding: 25px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
        }
        
        .logo {
            text-align: center;
            margin-bottom: 20px;
        }
        
        .logo h1 {
            color: #232F3E;
            font-size: 24px;
        }
        
        .logo p {
            color: #FF9900;
            font-weight: bold;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #232F3E;
        }
        
        select, input {
            width: 100%;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 10px;
            font-size: 16px;
            font-family: inherit;
            box-sizing: border-box;
        }
        
        select:focus, input:focus {
            outline: none;
            border-color: #FF9900;
        }
        
        button {
            width: 100%;
            background: #FF9900;
            color: #232F3E;
            border: none;
            padding: 14px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 10px;
            cursor: pointer;
            transition: transform 0.2s, background 0.2s;
        }
        
        button:active {
            transform: scale(0.98);
            background: #e68a00;
        }
        
        .message {
            margin-top: 20px;
            padding: 12px;
            border-radius: 10px;
            display: none;
            text-align: center;
        }
        
        .success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }
        
        .error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
        
        .info {
            font-size: 12px;
            color: #666;
            text-align: center;
            margin-top: 20px;
            padding-top: 15px;
            border-top: 1px solid #eee;
        }
        
        .badge {
            display: inline-block;
            background: #f0f0f0;
            padding: 5px 10px;
            border-radius: 15px;
            font-size: 12px;
            margin: 5px;
        }
        
        .loader {
            display: none;
            text-align: center;
            margin-top: 10px;
            font-size: 14px;
            color: #FF9900;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">
            <h1>📦 Demande de Formation</h1>
            <p>Amazon FC</p>
        </div>
        
        <form id="formationForm">
            <div class="form-group">
                <label>👤 Votre LOGIN (identifiant Amazon)</label>
                <input type="text" id="login" placeholder="Ex: JOHN.DOE" required autocomplete="off">
            </div>
            
            <div class="form-group">
                <label>🎯 Process souhaité</label>
                <select id="process" required>
                    <option value="">-- Choisissez un process --</option>
                    <option value="Pick">Pick (Préparation de commandes)</option>
                    <option value="Pack">Pack (Emballage)</option>
                    <option value="Stow">Stow (Réception/Rangement)</option>
                    <option value="Count">Count (Inventaire)</option>
                    <option value="Problem Solve">Problem Solve</option>
                    <option value="Water Spider">Water Spider</option>
                    <option value="Ship Dock">Ship Dock (Expédition)</option>
                    <option value="Receive">Receive (Réception)</option>
                </select>
            </div>
            
            <div class="form-group">
                <label>📝 Message supplémentaire (optionnel)</label>
                <input type="text" id="comment" placeholder="Précisions, disponibilités...">
            </div>
            
            <button type="submit">📨 Envoyer ma demande</button>
        </form>
        
        <div id="message" class="message"></div>
        <div id="loader" class="loader">⏳ Envoi en cours...</div>
        
        <div class="info">
            <span class="badge">🔒 Données sécurisées</span>
            <span class="badge">📱 Scan & Go</span>
            <span class="badge">☁️ Envoi vers Google Sheets</span>
        </div>
    </div>

    <script>
        // ⚠️ REMPLACE CETTE URL PAR LA TIENNE ⚠️
        const GOOGLE_SCRIPT_URL = "hhttps://script.google.com/macros/s/AKfycbxGjAdYFtTBv6FkdT_E86BIFl2oPZXpA1CUYqsBgxsXyPc9yebVZX5wKnhbOzCNGnmUxg/exec";
        
        document.getElementById('formationForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const login = document.getElementById('login').value.trim();
            const process = document.getElementById('process').value;
            const comment = document.getElementById('comment').value;
            
            if (!login || !process) {
                showMessage('Veuillez remplir tous les champs obligatoires', 'error');
                return;
            }
            
            // Afficher le loader
            document.getElementById('loader').style.display = 'block';
            
            // Préparer les données
            const data = {
                login: login,
                process: process,
                comment: comment || ""
            };
            
            try {
                // Envoyer vers Google Sheets
                const response = await fetch(GOOGLE_SCRIPT_URL, {
                    method: 'POST',
                    mode: 'no-cors',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify(data)
                });
                
                showMessage('✅ Demande envoyée avec succès ! Merci.', 'success');
                
                // Réinitialiser le formulaire
                document.getElementById('process').value = '';
                document.getElementById('comment').value = '';
                
            } catch (error) {
                console.error('Erreur:', error);
                showMessage('❌ Erreur lors de l\'envoi. Réessaie plus tard.', 'error');
            } finally {
                document.getElementById('loader').style.display = 'none';
            }
        });
        
        function showMessage(msg, type) {
            const messageDiv = document.getElementById('message');
            messageDiv.textContent = msg;
            messageDiv.className = `message ${type}`;
            messageDiv.style.display = 'block';
            
            setTimeout(() => {
                messageDiv.style.display = 'none';
            }, 4000);
        }
    </script>
</body>
</html>

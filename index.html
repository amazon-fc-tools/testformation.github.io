<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Demande de Formation - Amazon</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: linear-gradient(135deg, #232F3E 0%, #1a2532 100%);
            min-height: 100vh;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        
        .container {
            max-width: 500px;
            width: 100%;
            background: white;
            border-radius: 20px;
            padding: 25px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
        }
        
        .logo {
            text-align: center;
            margin-bottom: 20px;
        }
        
        .logo h1 {
            color: #232F3E;
            font-size: 24px;
        }
        
        .logo p {
            color: #FF9900;
            font-weight: bold;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #232F3E;
        }
        
        select, input {
            width: 100%;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 10px;
            font-size: 16px;
            font-family: inherit;
        }
        
        select:focus, input:focus {
            outline: none;
            border-color: #FF9900;
        }
        
        button {
            width: 100%;
            background: #FF9900;
            color: #232F3E;
            border: none;
            padding: 14px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 10px;
            cursor: pointer;
            transition: transform 0.2s, background 0.2s;
        }
        
        button:active {
            transform: scale(0.98);
            background: #e68a00;
        }
        
        .message {
            margin-top: 20px;
            padding: 12px;
            border-radius: 10px;
            display: none;
            text-align: center;
        }
        
        .success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }
        
        .error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
        
        .info {
            font-size: 12px;
            color: #666;
            text-align: center;
            margin-top: 20px;
            padding-top: 15px;
            border-top: 1px solid #eee;
        }
        
        .badge {
            display: inline-block;
            background: #f0f0f0;
            padding: 5px 10px;
            border-radius: 15px;
            font-size: 12px;
            margin: 5px;
        }
        
        .login-id {
            font-family: monospace;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">
            <h1>📦 Demande de Formation</h1>
            <p>Amazon FC</p>
        </div>
        
        <form id="formationForm">
            <div class="form-group">
                <label>👤 Votre LOGIN (identifiant Amazon)</label>
                <input type="text" id="login" placeholder="Ex: JOHN.DOE" required autocomplete="off">
            </div>
            
            <div class="form-group">
                <label>🎯 Process souhaité</label>
                <select id="process" required>
                    <option value="">-- Choisissez un process --</option>
                    <option value="Pick">Pick (Préparation de commandes)</option>
                    <option value="Pack">Pack (Emballage)</option>
                    <option value="Stow">Stow (Réception/Rangement)</option>
                    <option value="Count">Count (Inventaire)</option>
                    <option value="Problem Solve">Problem Solve</option>
                    <option value="Water Spider">Water Spider</option>
                    <option value="Ship Dock">Ship Dock (Expédition)</option>
                    <option value="Receive">Receive (Réception)</option>
                </select>
            </div>
            
            <div class="form-group">
                <label>📝 Message supplémentaire (optionnel)</label>
                <input type="text" id="comment" placeholder="Précisions, disponibilités...">
            </div>
            
            <button type="submit">📨 Envoyer ma demande</button>
        </form>
        
        <div id="message" class="message"></div>
        
        <div class="info">
            <span class="badge">🔒 Données sécurisées</span>
            <span class="badge">📱 Scan & Go</span>
            <div class="login-id" style="margin-top: 10px;">Version: Amazon Training Request v1.0</div>
        </div>
    </div>

    <script>
        // Configuration - ADAPTER SELON VOTRE SITUATION
        // Option 1: Envoyer par email (si accès email sur téléphone)
        const TARGET_EMAIL = "formation@votre-site.amazon"; // À remplacer par l'email du responsable
        
        // Option 2: Stockage local + export (si pas d'email)
        // Option 3: Envoi vers Google Sheets (voir section plus bas)
        
        document.getElementById('formationForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const login = document.getElementById('login').value.trim();
            const process = document.getElementById('process').value;
            const comment = document.getElementById('comment').value;
            const timestamp = new Date().toLocaleString('fr-FR');
            
            if (!login || !process) {
                showMessage('Veuillez remplir tous les champs obligatoires', 'error');
                return;
            }
            
            // Construction du message
            const demande = `📋 DEMANDE DE FORMATION AMAZON
━━━━━━━━━━━━━━━━━━━━━
👤 Associate: ${login}
🎯 Process: ${process}
📝 Commentaire: ${comment || "Aucun"}
⏰ Date: ${timestamp}
━━━━━━━━━━━━━━━━━━━━━`;
            
            // Sauvegarde locale (toujours)
            sauvegarderLocalement(login, process, comment, timestamp);
            
            // Tentative d'envoi par email (si possible)
            envoyerParEmail(demande, login);
            
            // Option alternative: copier dans le presse-papier
            copierDansPressePapier(demande);
            
            showMessage('✅ Demande enregistrée ! ' + 
                       (isEmailAvailable() ? 'Email envoyé.' : 'Copiez le texte et transmettez à votre responsable.'), 
                       'success');
            
            // Réinitialiser le formulaire (sauf login pour faciliter)
            document.getElementById('process').value = '';
            document.getElementById('comment').value = '';
        });
        
        function sauvegarderLocalement(login, process, comment, timestamp) {
            let historique = localStorage.getItem('amazonTrainingRequests');
            historique = historique ? JSON.parse(historique) : [];
            historique.push({ login, process, comment, timestamp });
            localStorage.setItem('amazonTrainingRequests', JSON.stringify(historique));
        }
        
        function envoyerParEmail(demande, login) {
            if (isEmailAvailable()) {
                // Sur mobile, ça ouvre l'app mail
                const subject = encodeURIComponent(`Demande formation - ${login}`);
                const body = encodeURIComponent(demande);
                window.location.href = `mailto:${TARGET_EMAIL}?subject=${subject}&body=${body}`;
            }
        }
        
        function copierDansPressePapier(texte) {
            navigator.clipboard.writeText(texte).then(() => {
                console.log('Texte copié');
            }).catch(() => {
                console.log('Impossible de copier');
            });
        }
        
        function isEmailAvailable() {
            // Vérifie si l'app mail est disponible (toujours vrai sur smartphone)
            return true;
        }
        
        function showMessage(msg, type) {
            const messageDiv = document.getElementById('message');
            messageDiv.textContent = msg;
            messageDiv.className = `message ${type}`;
            messageDiv.style.display = 'block';
            
            setTimeout(() => {
                messageDiv.style.display = 'none';
            }, 4000);
        }
    </script>
</body>
</html>
